# Spring Boot Application Configuration
spring.application.name=virtual-card-issuance

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:virtualcard;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for development/debugging, disabled by default in production)
spring.h2.console.enabled=true

# JPA/Hibernate Configuration (needed for transaction management)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

# Logging Configuration with MDC support for correlation IDs
logging.level.root=INFO
logging.level.com.nium.virtualcard=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Console logging pattern includes correlation ID from MDC
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n

# File logging pattern includes correlation ID from MDC
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n

# Optional: file logging
#logging.file.name=logs/virtual-card-issuance.log
#logging.file.max-size=10MB
#logging.file.max-history=10

# Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.export.simple.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.application=${spring.application.name}

# Prometheus Configuration
management.metrics.export.prometheus.enabled=true

# OpenAPI / Swagger UI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=list
springdoc.swagger-ui.show-common-extensions=true

# Card Service Configuration
card-service.optimistic-lock-retries=3

# Rate Limiting Configuration
rate-limiting.enabled=true
rate-limiting.global.requests-per-minute=1000
rate-limiting.card-creation.requests-per-minute=10
rate-limiting.financial-ops.requests-per-minute=50
rate-limiting.read-ops.requests-per-minute=100
